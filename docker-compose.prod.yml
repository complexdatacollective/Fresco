services:
  fresco:
    image: 'ghcr.io/complexdatacollective/fresco:latest'
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    volumes:
      - .:/app/next-app
    restart: always
    ports:
      - 3000:3000
    networks:
      - fresco_network
    env_file:
      - .env

  postgres:
    env_file:
      - .env
    image: postgres:17-alpine
    restart: always
    volumes:
      - postgres:/var/lib/postgresql/data:Z
    healthcheck:
      test: ['CMD', 'pg_isready', '-U', 'postgres']
      interval: 5s
      timeout: 10s
      retries: 5
    networks:
      - fresco_network

  # Optional: S3-compatible storage using MinIO.
  # If you prefer UploadThing, remove this service and configure
  # UploadThing during Fresco setup instead.
  #
  # MinIO stays PRIVATE: no published ports, no anonymous bucket access.
  # Browsers reach it through the bundled Traefik reverse proxy via a path
  # route on your Fresco domain: /assets/* -> minio:9000 (the bucket is named
  # 'assets'; path-style S3 URLs put the bucket name in the path). The path
  # and Host header are preserved - required for signature validation.
  #
  # Using your own reverse proxy instead of the bundled Traefik?
  # Caddy example:
  #   app.example.com {
  #     handle /assets/* {
  #       reverse_proxy minio:9000
  #     }
  #     handle {
  #       reverse_proxy fresco:3000
  #     }
  #   }
  # nginx example:
  #   location /assets/ {
  #     proxy_set_header Host $host;
  #     proxy_pass http://minio:9000;
  #   }
  #
  # During Fresco setup, select "S3 / S3-Compatible" and use:
  #   Endpoint URL:      http://minio:9000        (internal - containers only)
  #   Public URL:        https://<your domain>    (your Fresco domain)
  #   Bucket Name:       assets
  #   Region:            us-east-1
  #   Access Key ID:     value of MINIO_ROOT_USER (default: minioadmin)
  #   Secret Access Key: value of MINIO_ROOT_PASSWORD (default: minioadmin)
  #
  # Note: the bucket name occupies /<bucket>/ on your domain - keep the
  # default 'assets' (verified collision-free) or pick a name that cannot
  # collide with app routes.
  minio:
    image: minio/minio:latest
    restart: always
    # ports:
    #   - '9001:9001'  # Uncomment to expose the MinIO admin console for debugging only.
    volumes:
      - minio:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 5s
      timeout: 10s
      retries: 5
    networks:
      - fresco_network

  # One-shot container that creates the default bucket after MinIO starts.
  # Runs once and exits — it does not stay running.
  minio-init:
    image: minio/minio:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: /bin/sh
    command:
      - -c
      - |
        mc alias set minio http://minio:9000 $${MINIO_ROOT_USER} $${MINIO_ROOT_PASSWORD}
        mc mb --ignore-existing minio/assets
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    networks:
      - fresco_network

volumes:
  postgres:
  minio:

# Define a network, which allows containers to communicate
# with each other, by using their container name as a hostname
networks:
  fresco_network:
