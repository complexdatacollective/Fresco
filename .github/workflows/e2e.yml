name: E2E Tests

permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    outputs:
      outcome: ${{ steps.tests.outcome }}
      slug: ${{ steps.meta.outputs.slug }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute branch slug
        id: meta
        env:
          REF: ${{ github.head_ref || github.ref_name }}
        run: |
          SLUG=$(printf '%s' "$REF" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          printf 'slug=%s\n' "$SLUG" >> "$GITHUB_OUTPUT"

      - name: Run E2E tests
        id: tests
        continue-on-error: true
        run: ./scripts/run-e2e.sh

      - name: Reclaim artifact ownership
        if: always()
        run: sudo chown -R "$(id -u):$(id -g)" tests/e2e/playwright-report tests/e2e/test-results 2>/dev/null || true

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: tests/e2e/playwright-report/
          if-no-files-found: warn
          retention-days: 14

  deploy-report:
    if: always()
    needs: e2e
    runs-on: ubuntu-latest
    concurrency:
      group: e2e-pages-deploy
      cancel-in-progress: false
    environment:
      name: github-pages
      url: https://complexdatacollective.github.io/Fresco/${{ needs.e2e.outputs.slug }}/
    steps:
      - name: Download new report
        uses: actions/download-artifact@v8
        with:
          name: playwright-report
          path: new-report

      - name: Fetch existing pages content
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: existing-pages
        continue-on-error: true

      - name: Merge report into branch subdirectory
        env:
          SLUG: ${{ needs.e2e.outputs.slug }}
        run: |
          mkdir -p merged
          if [ -d existing-pages ] && [ "$(ls -A existing-pages 2>/dev/null)" ]; then
            cp -r existing-pages/. merged/
            rm -rf merged/.git
          fi
          rm -rf "merged/$SLUG"
          mkdir -p "merged/$SLUG"
          cp -r new-report/. "merged/$SLUG/"

      - uses: actions/upload-pages-artifact@v5
        with:
          path: merged/

      - uses: actions/deploy-pages@v5

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v9
        env:
          SLUG: ${{ needs.e2e.outputs.slug }}
          OUTCOME: ${{ needs.e2e.outputs.outcome }}
        with:
          script: |
            const { SLUG, OUTCOME } = process.env;
            const url = `https://complexdatacollective.github.io/Fresco/${SLUG}/`;
            const emoji = OUTCOME === 'success' ? '✅' : '❌';
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${emoji} E2E tests — **${OUTCOME}**\n\n📊 [View report](${url})`,
            });

  result:
    if: always()
    needs: e2e
    runs-on: ubuntu-latest
    steps:
      - name: Fail workflow if tests failed
        if: needs.e2e.outputs.outcome != 'success'
        run: exit 1
