name: E2E Tests

permissions:
  contents: read
  pages: write
  id-token: write
  statuses: write

on:
  workflow_dispatch:
  push:
    branches: [main, next]

jobs:
  e2e:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Setup
        id: setup
        uses: complexdatacollective/github-actions/setup-pnpm@v1
        with:
          install: 'false'
          cache-path: .pnpm-docker-store
          cache-key-prefix: pnpm-docker-store

      - name: Run E2E tests (${{ matrix.browser }})
        id: test
        run: pnpm test:e2e
        env:
          CI: true
          E2E_BROWSERS: ${{ matrix.browser }}

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.browser }}
          path: |
            tests/e2e/playwright-report/
            tests/e2e/test-results/
          retention-days: 30

      - name: Upload test videos
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-videos-${{ matrix.browser }}
          path: tests/e2e/test-results/**/*.webm
          retention-days: 7

      - name: Save pnpm cache
        if: always() && steps.setup.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .pnpm-docker-store
          key: ${{ steps.setup.outputs.cache-key }}

  resolve-pr:
    if: failure()
    needs: e2e
    runs-on: ubuntu-latest
    outputs:
      pr-number: ${{ steps.pr.outputs.number }}
      head-sha: ${{ steps.pr.outputs.head_sha }}
      branch: ${{ steps.pr.outputs.branch }}
    steps:
      - name: Resolve PR context
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          PR_NUMBER_INPUT: ${{ github.event.pull_request.number }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REF: ${{ github.head_ref }}
          REF_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            echo "number=$PR_NUMBER_INPUT" >> "$GITHUB_OUTPUT"
            echo "head_sha=$PR_HEAD_SHA" >> "$GITHUB_OUTPUT"
            echo "branch=$HEAD_REF" >> "$GITHUB_OUTPUT"
          else
            PR_NUMBER=$(gh pr list --repo "$REPO" --head "$REF_NAME" --json number --jq '.[0].number')
            if [ -n "$PR_NUMBER" ] && [ "$PR_NUMBER" != "null" ]; then
              echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
            fi
            echo "head_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
            echo "branch=$REF_NAME" >> "$GITHUB_OUTPUT"
          fi

  # Deploy report to GitHub Pages on test failure (PR-specific subdirectory)
  deploy-report:
    if: failure() && needs.resolve-pr.outputs.pr-number != ''
    needs: [e2e, resolve-pr]
    runs-on: ubuntu-latest
    concurrency:
      group: e2e-pages-deploy
      cancel-in-progress: false
    environment:
      name: github-pages
      url: https://complexdatacollective.github.io/Fresco/pr-${{ needs.resolve-pr.outputs.pr-number }}/

    steps:
      - name: Download playwright reports
        uses: actions/download-artifact@v4
        with:
          pattern: playwright-report-*
          path: new-report
          merge-multiple: true

      - name: Fetch existing GitHub Pages content
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: existing-pages
        continue-on-error: true

      - name: Merge reports into PR subdirectory
        env:
          PR_NUMBER: ${{ needs.resolve-pr.outputs.pr-number }}
        run: |
          mkdir -p merged

          # Copy existing pages content if it exists
          if [ -d existing-pages ] && [ "$(ls -A existing-pages 2>/dev/null)" ]; then
            cp -r existing-pages/* merged/ 2>/dev/null || true
            rm -rf merged/.git
          fi

          # Create PR-specific subdirectory with new report
          mkdir -p "merged/pr-${PR_NUMBER}"
          cp -r new-report/playwright-report/* "merged/pr-${PR_NUMBER}/"

          # Build index page listing all reports
          {
            echo '<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8">'
            echo '<title>Fresco E2E Test Reports</title>'
            echo '<style>body{font-family:system-ui;max-width:800px;margin:40px auto;padding:20px}ul{list-style:none;padding:0}li{padding:10px 0;border-bottom:1px solid #eee}a{color:#0066cc;text-decoration:none;font-size:1.1em}a:hover{text-decoration:underline}</style>'
            echo '</head><body><h1>Fresco E2E Test Reports</h1><p>Failed test reports by PR:</p><ul>'
            for dir in merged/pr-*/; do
              [ -d "$dir" ] && echo "  <li><a href=\"$(basename "$dir")/\">$(basename "$dir")</a></li>"
            done
            echo '</ul></body></html>'
          } > merged/index.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: merged/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Create per-browser status checks
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          SHA: ${{ needs.resolve-pr.outputs.head-sha }}
          PR_NUMBER: ${{ needs.resolve-pr.outputs.pr-number }}
          RUN_ID: ${{ github.run_id }}
        run: |
          REPORT_URL="https://complexdatacollective.github.io/Fresco/pr-${PR_NUMBER}/"

          gh api "repos/${REPO}/actions/runs/${RUN_ID}/jobs" \
            --jq '.jobs[] | select(.name | startswith("e2e")) | {name: .name, conclusion: .conclusion}' \
          | jq -r '. | "\(.name)|\(.conclusion)"' \
          | while IFS='|' read -r job_name conclusion; do
            browser=$(echo "$job_name" | sed 's/.*(\(.*\))/\1/')

            if [ "$conclusion" = "failure" ]; then
              state="failure"
              description="Tests failed — view report"
              target_url="${REPORT_URL}#?q=s%3Afailed"
            else
              state="success"
              description="Tests passed"
              target_url="${REPORT_URL}"
            fi

            echo "Setting status for ${browser}: ${state}"
            gh api "repos/${REPO}/statuses/${SHA}" \
              -f state="$state" \
              -f target_url="$target_url" \
              -f description="$description" \
              -f context="E2E Tests (${browser})"
          done
