autoInstallPeers: true

publicHoistPattern:
  - '*tailwind-config*'

allowBuilds:
  '@parcel/watcher': true
  '@posthog/cli': false
  '@prisma/engines': true
  '@tailwindcss/oxide': true
  core-js: false
  core-js-pure: true
  esbuild: true
  msgpackr-extract: false
  prisma: true
  protobufjs: false
  sharp: true
  unrs-resolver: true

patchedDependencies:
  '@codaco/network-exporters@1.0.3': patches/@codaco__network-exporters@1.0.3.patch
  react-best-merge-refs@1.0.2: patches/react-best-merge-refs@1.0.2.patch

# Force the transitive `effect` (pulled by uploadthing at the vulnerable 3.17.7,
# GHSA-38f7-945m-qr2g) onto the patched line we already depend on directly.
overrides:
  effect: '^3.21.3'

minimumReleaseAgeExclude:
  - '@codaco/*'
